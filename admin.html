<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orhane Finance | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --p: #6366f1; --bg: #0b1120; --c: #1e293b; --t: #f8fafc; --s: #10b981; --err: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 20px; }
        .card { background: var(--c); padding: 20px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; }
        h2 { color: var(--p); border-bottom: 2px solid var(--p); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        th { color: #94a3b8; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-onay { background: var(--s); color: white; margin-right: 5px; }
        .btn-red { background: var(--err); color: white; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .bg-shopier { background: #5b21b6; color: white; }
        .bg-cekme { background: #991b1b; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 Orhane Finance Yönetim Paneli</h2>
        <p>Buradan ödemeleri kontrol edip bakiyeleri tek tıkla onaylayabilirsin.</p>
    </div>

    <div class="card">
        <h3>🔔 Bekleyen Talepler</h3>
        <table>
            <thead>
                <tr>
                    <th>Kullanıcı</th>
                    <th>Tür</th>
                    <th>Tutar</th>
                    <th>İsim/Detay</th>
                    <th>İşlem</th>
                </tr>
            </thead>
            <tbody id="request-list">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h3>👥 Tüm Kullanıcılar</h3>
        <table>
            <thead>
                <tr>
                    <th>Kullanıcı Adı</th>
                    <th>Mevcut Bakiye</th>
                    <th>Şifre</th>
                </tr>
            </thead>
            <tbody id="user-list">
                </tbody>
        </table>
    </div>

<script>
    // Firebase Config (Senin bilgilerle aynı olmalı)
    const firebaseConfig = {
        apiKey: "AIzaSyAy-QZ960SSl9lzpCvCaLuw-y2XOv8Xd7Q",
        authDomain: "orhan-finance.firebaseapp.com",
        projectId: "orhan-finance",
        databaseURL: "https://orhan-finance-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Talepleri Dinle (Shopier ve Çekme)
    db.ref('requests').on('value', snap => {
        const list = document.getElementById('request-list');
        list.innerHTML = "";
        snap.forEach(child => {
            const r = child.val();
            const key = child.key;
            const badgeClass = r.type.includes('Shopier') ? 'bg-shopier' : 'bg-cekme';
            
            list.innerHTML += `
                <tr>
                    <td><b>${r.user}</b></td>
                    <td><span class="badge ${badgeClass}">${r.type}</span></td>
                    <td style="color:var(--s)">${r.amount} TL</td>
                    <td><small>${r.realName || r.iban || '-'}</small></td>
                    <td>
                        <button class="btn btn-onay" onclick="onayla('${key}', '${r.user}', ${r.amount}, '${r.type}')">ONAYLA</button>
                        <button class="btn btn-red" onclick="reddet('${key}')">SİL</button>
                    </td>
                </tr>
            `;
        });
    });

    // 2. Kullanıcıları Dinle
    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        snap.forEach(child => {
            const u = child.val();
            list.innerHTML += `
                <tr>
                    <td>${child.key}</td>
                    <td style="font-weight:bold; color:var(--s)">${(u.balance || 0).toFixed(2)} TL</td>
                    <td><small>${u.pass}</small></td>
                </tr>
            `;
        });
    });

    // ONAYLAMA FONKSİYONU
    function onayla(key, user, miktar, tip) {
        if(confirm(user + " için " + miktar + " TL bakiyeyi onaylıyor musun?")) {
            // Eğer çekme talebiyse bakiye zaten düşmüştür, sadece talebi sileriz.
            // Eğer yüklemeyse bakiyeyi ekleriz.
            if(tip.includes('Beklemede') || tip.includes('Yükleme')) {
                db.ref('users/' + user + '/balance').transaction(current => {
                    return (current || 0) + parseFloat(miktar);
                });
            }
            
            // Talebi listeden kaldır
            db.ref('requests/' + key).remove().then(() => {
                alert("İşlem Başarılı!");
            });
        }
    }

    // REDDETME/SİLME FONKSİYONU
    function reddet(key) {
        if(confirm("Bu talebi silmek istediğine emin misin?")) {
            db.ref('requests/' + key).remove();
        }
    }
</script>
</body>
</html>
